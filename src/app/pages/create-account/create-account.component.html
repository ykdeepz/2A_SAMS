<div class="page-container animate-fade-in">
  <!-- Header -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">Create Account</h1>
      <p class="page-subtitle">Manage user accounts for the system</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-container">
    @if (canCreateInstructor()) {
      <button
        [class]="'tab ' + (activeTab() === 'instructor' ? 'tab-active' : 'tab-inactive')"
        (click)="setActiveTab('instructor')"
      >
        <lucide-icon [img]="UserCircle" [size]="16" class="tab-icon"></lucide-icon>
        <span>Instructor</span>
      </button>
    }
    
    @if (canCreateStudent()) {
      <button
        [class]="'tab ' + (activeTab() === 'student' ? 'tab-active' : 'tab-inactive')"
        (click)="setActiveTab('student')"
      >
        <lucide-icon [img]="GraduationCap" [size]="16" class="tab-icon"></lucide-icon>
        <span>Student</span>
      </button>
    }
  </div>

  <!-- Form Card -->
  <div class="form-card">
    @if (activeTab() === 'instructor' && canCreateInstructor()) {
      <app-instructor-form (submitForm)="onInstructorSubmit($event)"></app-instructor-form>
    }
    
    @if (activeTab() === 'student' && canCreateStudent()) {
      <app-student-form (submitForm)="onStudentSubmit($event)"></app-student-form>
    }
  </div>
</div>
