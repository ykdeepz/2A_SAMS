<form (ngSubmit)="onSubmit()" class="form-container">
  <!-- Student Information Section -->
  <div class="form-section">
    <h3 class="section-title">Student Information</h3>
    
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label" for="student-id">
          Student ID <span class="required">*</span>
        </label>
        <input
          type="text"
          id="student-id"
          name="student_id"
          [(ngModel)]="formData.student_id"
          class="form-input"
          placeholder="e.g., STU-001"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="student-first-name">
          First Name <span class="required">*</span>
        </label>
        <input
          type="text"
          id="student-first-name"
          name="first_name"
          [(ngModel)]="formData.first_name"
          class="form-input"
          placeholder="Enter first name"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="student-middle-name">
          Middle Name
        </label>
        <input
          type="text"
          id="student-middle-name"
          name="middle_name"
          [(ngModel)]="formData.middle_name"
          class="form-input"
          placeholder="Enter middle name (optional)"
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="student-last-name">
          Last Name <span class="required">*</span>
        </label>
        <input
          type="text"
          id="student-last-name"
          name="last_name"
          [(ngModel)]="formData.last_name"
          class="form-input"
          placeholder="Enter last name"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="student-email">
          Email <span class="required">*</span>
        </label>
        <input
          type="email"
          id="student-email"
          name="email"
          [(ngModel)]="formData.email"
          class="form-input"
          placeholder="student@school.com"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="grade-level">
          Grade Level <span class="required">*</span>
        </label>
        <input
          type="text"
          id="grade-level"
          name="grade_level"
          [(ngModel)]="formData.grade_level"
          class="form-input"
          placeholder="e.g., Grade 11"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="section">
          Section <span class="required">*</span>
        </label>
        <input
          type="text"
          id="section"
          name="section"
          [(ngModel)]="formData.section"
          class="form-input"
          placeholder="e.g., Section A"
          required
        />
      </div>
    </div>
  </div>

  <!-- Parent Information Section -->
  <div class="form-section">
    <h3 class="section-title">Parent Information</h3>
    <p class="section-subtitle">A parent account will be automatically created</p>
    
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label" for="parent-first-name">
          Parent First Name <span class="required">*</span>
        </label>
        <input
          type="text"
          id="parent-first-name"
          name="parent_first_name"
          [(ngModel)]="parentData.first_name"
          class="form-input"
          placeholder="Enter first name"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="parent-middle-name">
          Parent Middle Name
        </label>
        <input
          type="text"
          id="parent-middle-name"
          name="parent_middle_name"
          [(ngModel)]="parentData.middle_name"
          class="form-input"
          placeholder="Enter middle name (optional)"
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="parent-last-name">
          Parent Last Name <span class="required">*</span>
        </label>
        <input
          type="text"
          id="parent-last-name"
          name="parent_last_name"
          [(ngModel)]="parentData.last_name"
          class="form-input"
          placeholder="Enter last name"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="parent-email">
          Parent Email <span class="required">*</span>
        </label>
        <input
          type="email"
          id="parent-email"
          name="parent_email"
          [(ngModel)]="parentData.email"
          class="form-input"
          placeholder="parent@email.com"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="parent-phone">
          Parent Phone <span class="required">*</span>
        </label>
        <input
          type="tel"
          id="parent-phone"
          name="parent_phone"
          [(ngModel)]="parentData.phone"
          class="form-input"
          placeholder="(555) 123-4567"
          required
        />
      </div>
    </div>
  </div>

  <button
    type="submit"
    class="submit-button"
    [disabled]="!isFormValid() || loading()"
  >
    @if (loading()) {
      <span class="button-spinner"></span>
      <span>Creating Accounts...</span>
    } @else {
      <span>Create Student Account</span>
    }
  </button>
</form>
