<div class="space-y-6 animate-fade-in">
  <!-- Header -->
  <div>
    <h2>Settings</h2>
    <p style="color: #64748b; margin-top: 0.5rem; font-size: 0.9375rem;">Manage your account preferences</p>
  </div>

  <!-- Settings Grid -->
  <div class="settings-grid">
    <!-- Profile Settings -->
    <div class="settings-card">
      <h3>Profile Information</h3>
      <form (ngSubmit)="updateProfile()">
        <div>
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email"
            [(ngModel)]="profileForm.email" 
            name="email" 
            placeholder="your.email@school.com"
            required
          />
        </div>
        <div>
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name"
            [(ngModel)]="profileForm.name" 
            name="name"
            placeholder="Enter your full name"
          />
        </div>
        <div>
          <label for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone"
            [(ngModel)]="profileForm.phone" 
            name="phone"
            placeholder="(555) 123-4567"
          />
        </div>
        <button type="submit" class="submit-button">
          Update Profile
        </button>
      </form>
    </div>

    <!-- Password Change -->
    <div class="settings-card">
      <h3>Change Password</h3>
      <form (ngSubmit)="changePassword()">
        <div>
          <label for="current-password">Current Password</label>
          <input 
            type="password" 
            id="current-password"
            [(ngModel)]="passwordForm.current" 
            name="current" 
            placeholder="Enter current password"
            required
          />
        </div>
        <div>
          <label for="new-password">New Password</label>
          <input 
            type="password" 
            id="new-password"
            [(ngModel)]="passwordForm.new" 
            name="new" 
            placeholder="Enter new password"
            required
          />
        </div>
        <div>
          <label for="confirm-password">Confirm New Password</label>
          <input 
            type="password" 
            id="confirm-password"
            [(ngModel)]="passwordForm.confirm" 
            name="confirm" 
            placeholder="Confirm new password"
            required
          />
        </div>
        <button type="submit" class="submit-button">
          Change Password
        </button>
      </form>
    </div>
  </div>

  <!-- Success Toast -->
  @if (message()) {
    <div class="success-toast">
      {{message()}}
    </div>
  }
</div>
